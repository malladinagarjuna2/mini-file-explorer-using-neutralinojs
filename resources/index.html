<!DOCTYPE html>
<html>
<head>
  <title>Mini File Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📁 File Explorer</h1>
    </header>

    <div class="toolbar">
      <button id="selectFolderBtn" class="btn-primary">
        <span class="icon">📂</span> Select Folder
      </button>
      <button id="createFolderBtn" class="btn-success">
        <span class="icon">➕</span> New Folder
      </button>
      <button id="deleteFolderBtn" class="btn-danger" disabled>
        <span class="icon">🗑️</span> Delete
      </button>
    </div>

    <div class="path-bar">
      <span class="path-label">Current Path:</span>
      <span id="folderPath" class="path-value">No folder selected</span>
      <span id="pollingIndicator" class="polling-indicator" style="display: none;">
        🔄 Auto-refresh active
      </span>
    </div>

    <div class="action-bar">
      <button id="backBtn" class="btn-secondary" disabled>
        <span class="icon">⬅️</span> Back
      </button>
      <button id="readdirectory" class="btn-secondary">
        <span class="icon">🔄</span> Refresh
      </button>
      <button id="getStats" class="btn-secondary">
        <span class="icon">ℹ️</span> Info
      </button>
    </div>

    <div class="file-browser">
      <ul id="fileList"></ul>
    </div>
  </div>
 
  <div id="contextMenu" class="context-menu">
    <button id="deleteItemBtn">
      <span class="icon">🗑️</span> Delete
    </button>
    <button id="renameItemBtn">
      <span class="icon">✏️</span> Rename
    </button>
  </div>

  <!-- Video Player Modal -->
  <div id="videoModal" class="video-modal">
    <div class="video-container">
      <div class="video-header">
        <span id="videoTitle" class="video-title">Now Playing</span>
        <button id="closeVideoBtn" class="close-video-btn">✕</button>
      </div>
      <video id="videoPlayer" class="video-player" controls="controls" autoplay>
        <source id="videoSource" src="" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="video-info">
        <p id="videoPath" class="video-path"></p>
      </div>
    </div>
  </div>

  <script src="js/neutralino.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
